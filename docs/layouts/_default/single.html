{{ define "title" }}{{ .Title }} - {{ .Site.Title }}{{ end }}

{{ define "main" }}
<div class="grid" style="grid-template-columns: 250px 1fr;">
    <aside>
        <nav>
            <ul>
                <li><strong>メニュー</strong></li>
                <li><a href="{{ .Site.BaseURL | relURL }}" class="secondary">ホーム</a></li>
                {{ range (where .Site.RegularPages "Section" "docs").ByWeight }}
                <li><a href="{{ .RelPermalink }}" class="{{ if eq $.RelPermalink .RelPermalink }}contrast{{ else }}secondary{{ end }}">{{ .Title }}</a></li>
                {{ end }}
            </ul>
        </nav>
    </aside>
    <section>
        <article>
            <header>
                <h1>{{ .Title }}</h1>
            </header>
            {{ .Content }}
        </article>
    </section>
</div>
{{ end }}
